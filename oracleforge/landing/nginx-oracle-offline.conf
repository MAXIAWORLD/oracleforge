# MAXIA Oracle — PRIVATE PREVIEW vhost
# Backend + full landing offline. Cert auto-renewal preserved.
# /etc/nginx/sites-available/oracle

# HTTP -> HTTPS (keeps /.well-known/acme-challenge/ for cert renewal)
server {
    listen 80;
    listen [::]:80;
    server_name oracle.maxiaworld.app;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

# HTTPS — placeholder page only
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name oracle.maxiaworld.app;

    ssl_certificate     /etc/letsencrypt/live/oracle.maxiaworld.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oracle.maxiaworld.app/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_stapling on;
    ssl_stapling_verify on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;

    root /var/www/oracle;

    # Root — internal rewrite to placeholder (avoids directory-index 403)
    location = / {
        rewrite ^ /placeholder.html last;
    }

    # Explicit serve of placeholder file
    location = /placeholder.html {
        # served from /var/www/oracle/placeholder.html
    }

    # Everything else — Gone (keeps cert renewal route untouched above)
    location / {
        default_type text/plain;
        return 410 "MAXIA Oracle is in private preview. Not publicly available yet.\n";
    }
}
