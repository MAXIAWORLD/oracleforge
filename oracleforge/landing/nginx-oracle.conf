# MAXIA Oracle — nginx vhost
# /etc/nginx/sites-available/oracle

# HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name oracle.maxiaworld.app;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

# HTTPS — static landing + proxied API
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name oracle.maxiaworld.app;

    ssl_certificate     /etc/letsencrypt/live/oracle.maxiaworld.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oracle.maxiaworld.app/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;

    client_max_body_size 64k;

    root /var/www/oracle;
    index index.html;

    # ── llms.txt at root (AI SEO) ────────────────────────────────
    location = /llms.txt {
        default_type text/plain;
        include /etc/nginx/snippets/oracle-headers.conf;
        add_header Cache-Control "public, max-age=3600" always;
        try_files /llms.txt =404;
    }

    # ── OG image ─────────────────────────────────────────────────
    location = /og.png {
        include /etc/nginx/snippets/oracle-headers.conf;
        add_header Cache-Control "public, max-age=86400, immutable" always;
        try_files /og.png =404;
    }

    # ── API reference (static Scalar bundle — needs jsdelivr CDN) ─
    location /docs/ {
        alias /var/www/oracle/docs/;
        index index.html;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Frame-Options "DENY" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' data: https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data: https:; connect-src 'self' https://cdn.jsdelivr.net; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
        add_header Cache-Control "public, max-age=600" always;
        try_files $uri $uri/ =404;
    }
    location = /docs { return 301 /docs/; }

    # ── Defense in depth: raw OpenAPI schema NEVER exposed ──────
    location = /openapi.json { return 404; }

    # ── Proxied API endpoints (JSON responses) ───────────────────
    location /health {
        include /etc/nginx/snippets/oracle-proxy.conf;
        proxy_pass http://127.0.0.1:8003;
    }
    location /api/ {
        include /etc/nginx/snippets/oracle-proxy.conf;
        proxy_pass http://127.0.0.1:8003;
    }

    # ── MCP (SSE-friendly) ───────────────────────────────────────
    location /mcp/sse {
        proxy_pass http://127.0.0.1:8003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
        chunked_transfer_encoding on;
    }
    location /mcp/messages/ {
        proxy_pass http://127.0.0.1:8003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # ── Static landing at root ───────────────────────────────────
    location / {
        include /etc/nginx/snippets/oracle-headers.conf;
        add_header Cache-Control "public, max-age=300" always;
        try_files $uri $uri/ /index.html;
    }
}
