server {
    listen 80;
    server_name mission.maxiaworld.app;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name mission.maxiaworld.app;

    ssl_certificate     /etc/letsencrypt/live/mission.maxiaworld.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mission.maxiaworld.app/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Static landing page
    location = / {
        root /opt/missionforge/landing;
        try_files /index.html =404;
    }
    location ~* \.(css|js|png|jpg|ico|svg|woff2?)$ {
        root /opt/missionforge/landing;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API — proxy to uvicorn
    location /api/ {
        proxy_pass         http://127.0.0.1:8001/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # MCP SSE — long-lived connections
    location /mcp/ {
        proxy_pass             http://127.0.0.1:8001/mcp/;
        proxy_set_header       Host $host;
        proxy_set_header       X-Real-IP $remote_addr;
        proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_http_version     1.1;
        proxy_set_header       Connection "";
        proxy_read_timeout     3600s;
        proxy_buffering        off;
        proxy_cache            off;
        chunked_transfer_encoding on;
    }

    # Health check — direct
    location /health {
        proxy_pass http://127.0.0.1:8001/health;
        proxy_set_header Host $host;
    }

    # OpenAPI docs
    location ~ ^/(docs|redoc|openapi.json) {
        proxy_pass http://127.0.0.1:8001$request_uri;
        proxy_set_header Host $host;
    }
}
