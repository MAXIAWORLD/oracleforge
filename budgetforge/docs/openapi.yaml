components:
  schemas:
    AgentBreakdown:
      properties:
        agents:
          additionalProperties:
            $ref: '#/components/schemas/AgentStats'
          title: Agents
          type: object
        total_calls:
          title: Total Calls
          type: integer
      required:
      - agents
      - total_calls
      title: AgentBreakdown
      type: object
    AgentStats:
      properties:
        calls:
          title: Calls
          type: integer
        cost_usd:
          title: Cost Usd
          type: number
      required:
      - calls
      - cost_usd
      title: AgentStats
      type: object
    BudgetActionEnum:
      enum:
      - block
      - downgrade
      title: BudgetActionEnum
      type: string
    BudgetResponse:
      properties:
        action:
          title: Action
          type: string
        alert_threshold_pct:
          title: Alert Threshold Pct
          type: integer
        budget_usd:
          title: Budget Usd
          type: number
        max_cost_per_call_usd:
          anyOf:
          - type: number
          - type: 'null'
          title: Max Cost Per Call Usd
        proxy_retries:
          anyOf:
          - type: integer
          - type: 'null'
          title: Proxy Retries
        proxy_timeout_ms:
          anyOf:
          - type: integer
          - type: 'null'
          title: Proxy Timeout Ms
        reset_period:
          default: none
          title: Reset Period
          type: string
        warning:
          anyOf:
          - type: string
          - type: 'null'
          title: Warning
      required:
      - budget_usd
      - alert_threshold_pct
      - action
      title: BudgetResponse
      type: object
    BudgetUpdate:
      properties:
        action:
          $ref: '#/components/schemas/BudgetActionEnum'
        alert_threshold_pct:
          default: 80
          maximum: 100.0
          minimum: 0.0
          title: Alert Threshold Pct
          type: integer
        allowed_providers:
          default: []
          items:
            type: string
          title: Allowed Providers
          type: array
        budget_usd:
          minimum: 0.0
          title: Budget Usd
          type: number
        downgrade_chain:
          default: []
          items:
            type: string
          title: Downgrade Chain
          type: array
        max_cost_per_call_usd:
          anyOf:
          - minimum: 0.0
            type: number
          - type: 'null'
          title: Max Cost Per Call Usd
        proxy_retries:
          anyOf:
          - maximum: 5.0
            minimum: 0.0
            type: integer
          - type: 'null'
          title: Proxy Retries
        proxy_timeout_ms:
          anyOf:
          - maximum: 300000.0
            minimum: 1000.0
            type: integer
          - type: 'null'
          title: Proxy Timeout Ms
        reset_period:
          default: none
          title: Reset Period
          type: string
      required:
      - budget_usd
      - action
      title: BudgetUpdate
      type: object
    DailySpend:
      properties:
        date:
          title: Date
          type: string
        spend:
          title: Spend
          type: number
      required:
      - date
      - spend
      title: DailySpend
      type: object
    DemoDaily:
      properties:
        date:
          title: Date
          type: string
        spend:
          title: Spend
          type: number
      required:
      - date
      - spend
      title: DemoDaily
      type: object
    DemoProject:
      properties:
        action:
          anyOf:
          - type: string
          - type: 'null'
          title: Action
        budget_usd:
          title: Budget Usd
          type: number
        name:
          title: Name
          type: string
        pct_used:
          title: Pct Used
          type: number
        used_usd:
          title: Used Usd
          type: number
      required:
      - name
      - budget_usd
      - used_usd
      - pct_used
      - action
      title: DemoProject
      type: object
    DemoSummary:
      properties:
        at_risk_count:
          title: At Risk Count
          type: integer
        exceeded_count:
          title: Exceeded Count
          type: integer
        projects_count:
          title: Projects Count
          type: integer
        total_calls:
          title: Total Calls
          type: integer
        total_cost_usd:
          title: Total Cost Usd
          type: number
      required:
      - total_cost_usd
      - total_calls
      - projects_count
      - at_risk_count
      - exceeded_count
      title: DemoSummary
      type: object
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          title: Detail
          type: array
      title: HTTPValidationError
      type: object
    HistoryPage:
      properties:
        items:
          items:
            $ref: '#/components/schemas/UsageRecord'
          title: Items
          type: array
        page:
          title: Page
          type: integer
        page_size:
          title: Page Size
          type: integer
        pages:
          title: Pages
          type: integer
        total:
          title: Total
          type: integer
        total_cost_usd:
          title: Total Cost Usd
          type: number
        warning:
          anyOf:
          - type: string
          - type: 'null'
          title: Warning
      required:
      - items
      - total
      - page
      - page_size
      - pages
      - total_cost_usd
      title: HistoryPage
      type: object
    MemberCreate:
      properties:
        email:
          title: Email
          type: string
        role:
          default: viewer
          enum:
          - admin
          - viewer
          title: Role
          type: string
      required:
      - email
      title: MemberCreate
      type: object
    MemberResponse:
      properties:
        api_key:
          title: Api Key
          type: string
        email:
          title: Email
          type: string
        id:
          title: Id
          type: integer
        role:
          title: Role
          type: string
      required:
      - id
      - email
      - api_key
      - role
      title: MemberResponse
      type: object
    PlanStatus:
      properties:
        calls_limit:
          title: Calls Limit
          type: integer
        calls_this_month:
          title: Calls This Month
          type: integer
        plan:
          title: Plan
          type: string
      required:
      - plan
      - calls_this_month
      - calls_limit
      title: PlanStatus
      type: object
    PlanUpdate:
      properties:
        force:
          default: false
          title: Force
          type: boolean
        plan:
          title: Plan
          type: string
      required:
      - plan
      title: PlanUpdate
      type: object
    PortalRequestBody:
      properties:
        email:
          title: Email
          type: string
      required:
      - email
      title: PortalRequestBody
      type: object
    ProjectCreate:
      properties:
        alert_email:
          anyOf:
          - type: string
          - type: 'null'
          title: Alert Email
        name:
          minLength: 1
          title: Name
          type: string
        webhook_url:
          anyOf:
          - type: string
          - type: 'null'
          title: Webhook Url
      required:
      - name
      title: ProjectCreate
      type: object
    ProjectResponse:
      properties:
        action:
          anyOf:
          - type: string
          - type: 'null'
          title: Action
        alert_email:
          anyOf:
          - type: string
          - type: 'null'
          title: Alert Email
        alert_threshold_pct:
          anyOf:
          - type: integer
          - type: 'null'
          title: Alert Threshold Pct
        allowed_providers:
          default: []
          items:
            type: string
          title: Allowed Providers
          type: array
        api_key:
          title: Api Key
          type: string
        budget_usd:
          anyOf:
          - type: number
          - type: 'null'
          title: Budget Usd
        downgrade_chain:
          default: []
          items:
            type: string
          title: Downgrade Chain
          type: array
        id:
          title: Id
          type: integer
        max_cost_per_call_usd:
          anyOf:
          - type: number
          - type: 'null'
          title: Max Cost Per Call Usd
        name:
          title: Name
          type: string
        plan:
          default: free
          title: Plan
          type: string
        reset_period:
          default: none
          title: Reset Period
          type: string
        webhook_url:
          anyOf:
          - type: string
          - type: 'null'
          title: Webhook Url
      required:
      - id
      - name
      - api_key
      title: ProjectResponse
      type: object
    ProviderStats:
      properties:
        calls:
          title: Calls
          type: integer
        cost_usd:
          title: Cost Usd
          type: number
        tokens_in:
          title: Tokens In
          type: integer
        tokens_out:
          title: Tokens Out
          type: integer
      required:
      - calls
      - cost_usd
      - tokens_in
      - tokens_out
      title: ProviderStats
      type: object
    RefreshRequest:
      description: Requête pour rafraîchir un token.
      properties:
        refresh_token:
          title: Refresh Token
          type: string
      required:
      - refresh_token
      title: RefreshRequest
      type: object
    SettingsUpdate:
      properties:
        alert_from_email:
          anyOf:
          - type: string
          - type: 'null'
          title: Alert From Email
        smtp_host:
          anyOf:
          - type: string
          - type: 'null'
          title: Smtp Host
        smtp_password:
          anyOf:
          - type: string
          - type: 'null'
          title: Smtp Password
        smtp_port:
          anyOf:
          - type: integer
          - type: 'null'
          title: Smtp Port
        smtp_user:
          anyOf:
          - type: string
          - type: 'null'
          title: Smtp User
      title: SettingsUpdate
      type: object
    SignupFreeRequest:
      properties:
        email:
          title: Email
          type: string
      required:
      - email
      title: SignupFreeRequest
      type: object
    TokenRequest:
      description: Requête pour obtenir des tokens JWT.
      properties:
        api_key:
          title: Api Key
          type: string
      required:
      - api_key
      title: TokenRequest
      type: object
    TokenResponse:
      description: Réponse avec tokens JWT.
      properties:
        access_token:
          title: Access Token
          type: string
        expires_in:
          title: Expires In
          type: integer
        refresh_token:
          title: Refresh Token
          type: string
      required:
      - access_token
      - refresh_token
      - expires_in
      title: TokenResponse
      type: object
    UsageBreakdown:
      properties:
        cloud_pct:
          title: Cloud Pct
          type: number
        local_pct:
          title: Local Pct
          type: number
        providers:
          additionalProperties:
            $ref: '#/components/schemas/ProviderStats'
          title: Providers
          type: object
        total_calls:
          title: Total Calls
          type: integer
      required:
      - local_pct
      - cloud_pct
      - total_calls
      - providers
      title: UsageBreakdown
      type: object
    UsageRecord:
      properties:
        agent:
          anyOf:
          - type: string
          - type: 'null'
          title: Agent
        cost_usd:
          title: Cost Usd
          type: number
        created_at:
          format: date-time
          title: Created At
          type: string
        id:
          title: Id
          type: integer
        model:
          title: Model
          type: string
        project_id:
          title: Project Id
          type: integer
        project_name:
          title: Project Name
          type: string
        provider:
          title: Provider
          type: string
        tokens_in:
          title: Tokens In
          type: integer
        tokens_out:
          title: Tokens Out
          type: integer
      required:
      - id
      - project_id
      - project_name
      - provider
      - model
      - tokens_in
      - tokens_out
      - cost_usd
      - created_at
      title: UsageRecord
      type: object
    UsageSummary:
      properties:
        budget_usd:
          anyOf:
          - type: number
          - type: 'null'
          title: Budget Usd
        calls:
          default: 0
          title: Calls
          type: integer
        forecast_days:
          anyOf:
          - type: number
          - type: 'null'
          title: Forecast Days
        pct_used:
          title: Pct Used
          type: number
        remaining_usd:
          title: Remaining Usd
          type: number
        used_usd:
          title: Used Usd
          type: number
      required:
      - used_usd
      - budget_usd
      - remaining_usd
      - pct_used
      title: UsageSummary
      type: object
    ValidationError:
      properties:
        ctx:
          title: Context
          type: object
        input:
          title: Input
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          title: Location
          type: array
        msg:
          title: Message
          type: string
        type:
          title: Error Type
          type: string
      required:
      - loc
      - msg
      - type
      title: ValidationError
      type: object
  securitySchemes:
    HTTPBearer:
      scheme: bearer
      type: http
info:
  contact:
    email: ceo@maxiaworld.app
    name: MAXIA Lab Support
    url: https://maxiaworld.app/
  description: "\n    **LLM Budget Guard** — Proxy layer with hard limits per project/user/agent\n\
    \    \n    ## Features\n    - \U0001F512 **Budget enforcement** per project with\
    \ hard limits\n    - \U0001F504 **Multi-provider support** (OpenAI, Anthropic,\
    \ Google, OpenRouter, etc.)\n    - \U0001F4CA **Real-time monitoring** with usage\
    \ analytics\n    - \U0001F6A8 **Alerts & notifications** when budgets are exceeded\n\
    \    - \U0001F510 **JWT authentication** with refresh tokens\n    - ⚡ **Rate limiting**\
    \ to prevent abuse\n    \n    ## Quick Start\n    1. Create a project via `/api/projects`\
    \ (POST)\n    2. Get your API key from the response\n    3. Use the proxy endpoints\
    \ with your API key\n    \n    ## Authentication\n    Use `Bearer <API_KEY>` in\
    \ the Authorization header for project endpoints,\n    or `Bearer <JWT_TOKEN>`\
    \ for user authentication.\n    \n    **Production URL**: https://llmbudget.maxiaworld.app\n\
    \    "
  license:
    name: Proprietary
    url: https://maxiaworld.app/terms
  title: LLM BudgetForge
  version: 1.0.0
openapi: 3.1.0
paths:
  /api/admin/stats:
    get:
      operationId: admin_stats_api_admin_stats_get
      parameters:
      - in: header
        name: X-Admin-Key
        required: false
        schema:
          default: ''
          title: X-Admin-Key
          type: string
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Admin Stats
      tags:
      - admin
  /api/checkout/{plan}:
    post:
      operationId: create_checkout_session_api_checkout__plan__post
      parameters:
      - in: path
        name: plan
        required: true
