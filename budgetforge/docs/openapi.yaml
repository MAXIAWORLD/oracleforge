    post:
      operationId: create_member_api_members_post
      parameters:
      - in: header
        name: X-Admin-Key
        required: false
        schema:
          default: ''
          title: X-Admin-Key
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemberCreate'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
