# HTTP — redirect to HTTPS + certbot ACME challenge
server {
    listen 80;
    server_name budgetforge.yourdomain.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
# After running: certbot --nginx -d budgetforge.yourdomain.com
# certbot fills in ssl_certificate / ssl_certificate_key automatically.
server {
    listen 443 ssl;
    server_name budgetforge.yourdomain.com;

    # ssl_certificate     /etc/letsencrypt/live/budgetforge.yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/budgetforge.yourdomain.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Dashboard (Next.js — port 3011)
    location / {
        proxy_pass         http://127.0.0.1:3011;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    # Backend API (FastAPI — port 8011)
    location /api/ {
        proxy_pass       http://127.0.0.1:8011;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /proxy/ {
        proxy_pass         http://127.0.0.1:8011;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    location /health {
        proxy_pass http://127.0.0.1:8011;
    }
}
